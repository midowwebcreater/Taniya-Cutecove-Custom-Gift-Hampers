<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taniya Cutecove</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#ff9eb5,#ffd1dc);
color:#333;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
}

.hero h1{font-size:42px;}
.hero p{margin-top:10px;}

.btn{
margin-top:20px;
padding:14px 30px;
background:#fff;
color:#ff4d88;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.3);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
}

/* ORDER FORM */
.form-box{
max-width:500px;
margin:auto;
background:rgba(255,255,255,0.4);
padding:25px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

/* MODAL */
#successModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:#fff;
padding:30px;
border-radius:15px;
text-align:center;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>Taniya Cutecove 🎁</h1>
<p>Luxury Custom Hampers Crafted with Love 💖</p>
<a href="#order" class="btn">Order Now</a>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Our Hampers</h2>

<div class="grid">
<div class="card">Birthday Hamper – ₹999</div>
<div class="card">Love Hamper – ₹1299</div>
<div class="card">Custom Gift Box – ₹799</div>
</div>
</section>

<!-- ORDER SYSTEM -->
<section id="order" class="section">
<h2>Place Your Order 🛒</h2>

<div class="form-box">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="product">
<option>Birthday Hamper</option>
<option>Love Hamper</option>
<option>Custom Gift Box</option>
</select>

<input type="text" id="custom" placeholder="Customization (Name/Message)">

<input type="date" id="date">

<button onclick="placeOrder()" class="btn" style="width:100%;">
Confirm Order
</button>

</div>
</section>

<!-- CTA -->
<section class="section">
<h2>Make Someone Smile Today 💝</h2>
<p>Premium hampers delivered with care</p>
</section>

<!-- SUCCESS MODAL -->
<div id="successModal">
<div class="modal-content">
<h2>🎉 Order Submitted!</h2>
<p>We will contact you shortly.</p>
<br>
<button onclick="closeModal()" class="btn">Close</button>
</div>
</div>

<script>

function placeOrder(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let product = document.getElementById("product").value;
let custom = document.getElementById("custom").value;
let date = document.getElementById("date").value;

if(!name || !phone){
alert("Please fill required fields");
return;
}

/* STORE ORDER LOCALLY (DEMO PURPOSE) */
let order = {
name, phone, product, custom, date
};

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));

/* SHOW SUCCESS */
document.getElementById("successModal").style.display = "flex";

/* RESET FORM */
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("custom").value="";
document.getElementById("date").value="";

}

function closeModal(){
document.getElementById("successModal").style.display = "none";
}

</script>

</body>
</html>
